# Production deployment configuration for AWS Lightsail
# Frontend is hosted separately on Vercel
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      QB2_API_HOST: "${QB2_API_HOST:-0.0.0.0}"
      QB2_API_PORT: "${QB2_API_PORT:-8080}"
      QB2_ENVIRONMENT: "${QB2_ENVIRONMENT:-production}"
      QB2_SERVICE_NAME: "${QB2_SERVICE_NAME:-quantum-backend}"
      QB2_JSON_LOGS: "${QB2_JSON_LOGS:-true}"
      QB2_LOG_LEVEL: "${QB2_LOG_LEVEL:-INFO}"
      QB2_AUTH_REQUIRED: "${QB2_AUTH_REQUIRED:-true}"
      QB2_MONGODB_TARGET: "${QB2_MONGODB_TARGET:-remote}"
      QB2_MONGODB_REMOTE_URI: "${QB2_MONGODB_REMOTE_URI}"
      QB2_MONGODB_DATABASE: "${QB2_MONGODB_DATABASE:-qds}"
      QB2_PEER_LOG_DIR: "${QB2_PEER_LOG_DIR:-/workspace/backend/quantum-backend/peer-logs}"
      QB2_PEER_ID: "${QB2_PEER_ID:-qb2-production-peer}"
      QB2_LIBP2P_ENABLED: "${QB2_LIBP2P_ENABLED:-true}"
      QB2_LIBP2P_PEER_ID: "${QB2_LIBP2P_PEER_ID:-qb2-production-peer}"
      QB2_LIBP2P_LISTEN_MULTIADDRS: "${QB2_LIBP2P_LISTEN_MULTIADDRS:-/ip4/0.0.0.0/tcp/4011}"
      QB2_LIBP2P_PEERSTORE_PATH: "${QB2_LIBP2P_PEERSTORE_PATH:-/workspace/backend/quantum-backend/libp2p/peerstore.sqlite3}"
      QB2_LIBP2P_ACTIVATE_LISTENERS: "${QB2_LIBP2P_ACTIVATE_LISTENERS:-true}"
      QB2_LIBP2P_DEV_SERVICE_PEER_COUNT: "${QB2_LIBP2P_DEV_SERVICE_PEER_COUNT:-0}"
      QB2_LIBP2P_DEV_SERVICE_BASE_PORT: "${QB2_LIBP2P_DEV_SERVICE_BASE_PORT:-4021}"
      AWS_BEDROCK_ENABLED: "${AWS_BEDROCK_ENABLED:-true}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_BEDROCK_DEFAULT_MODEL: "${AWS_BEDROCK_DEFAULT_MODEL:-us.anthropic.claude-sonnet-4-6}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Coinbase AgentKit / CDP
      CDP_API_KEY_NAME: "${CDP_API_KEY_NAME}"
      CDP_API_KEY_PRIVATE_KEY: "${CDP_API_KEY_PRIVATE_KEY}"
      CDP_API_KEY_ID: "${CDP_API_KEY_ID}"
      CDP_API_KEY_SECRET: "${CDP_API_KEY_SECRET}"
      CDP_WALLET_SECRET: "${CDP_WALLET_SECRET}"
      NETWORK: "${NETWORK:-base-sepolia}"
      WALLET_ENCRYPTION_KEY: "${WALLET_ENCRYPTION_KEY}"
      # Notifications (Resend)
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-noreply@distributed-quantum.com}"
      # IPFS (Pinata)
      PINATA_JWT: "${PINATA_JWT}"
      PINATA_API_KEY: "${PINATA_API_KEY}"
      PINATA_API_SECRET: "${PINATA_API_SECRET}"
    volumes:
      - backend_runtime:/workspace/backend/quantum-backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # Only expose to Caddy, not to host network
    networks:
      - backend_network

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      backend:
        condition: service_healthy
    environment:
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 support
      # libp2p port for peer-to-peer communication
      - "4011:4011"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - backend_network

volumes:
  backend_runtime:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  backend_network:
    driver: bridge
